name: QFMS Hive Engine
on:
  repository_dispatch:
    types: [cad_uploaded]

jobs:
  analyze_and_generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Hive AI Logic Execution
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python core/hive_processor.py \
          --mass ${{ github.event.client_payload.mass }} \
          --file_url ${{ github.event.client_payload.file_url }}

      - name: Commit Generated Artifacts
        run: |
          git config --global user.name "PopeTroy-Hive"
          git config --global user.email "info@celsiusmediagroup.co.za"
          git add reports/ flash/
          git commit -m "Generated Prototype Artifacts - Session ${{ github.run_id }}"
          git push
